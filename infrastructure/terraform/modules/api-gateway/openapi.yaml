swagger: "2.0"
info:
  title: Cervelet API Gateway
  description: Single public entry point for the Cervelet serverless application
  version: 1.0.0
schemes:
  - https
produces:
  - application/json

securityDefinitions:
  api_key:
    type: apiKey
    name: x-api-key
    in: header

security:
  - api_key: []

x-google-backend:
  address: ${backend_url}
  deadline: 30.0

paths:
  /discord/interactions:
    post:
      summary: Discord Interactions endpoint (slash commands, buttons)
      operationId: discordInteractions
      # No API key -- Discord authenticates via Ed25519 signature.
      # The proxy verifies the signature using DISCORD_PUBLIC_KEY.
      security: []
      consumes:
        - application/json
      responses:
        200:
          description: Interaction response (PONG, message, or deferred ACK)
        401:
          description: Invalid signature
        500:
          description: Internal Server Error

  # Note: Access-Control-Allow-Origin headers below are informational only.
  # Actual CORS enforcement is handled by the cf-proxy backend (NestJS middleware).
  # Restrict the backend CORS origin to the frontend domain in production.
  /**:
    get:
      summary: Catch-all GET
      operationId: catchAllGet
      security:
        - api_key: []
      responses:
        200:
          description: Success
          headers:
            Access-Control-Allow-Origin:
              type: string
              default: "*"
            Access-Control-Allow-Headers:
              type: string
              default: "Content-Type, Authorization, x-api-key"
            Access-Control-Allow-Methods:
              type: string
              default: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
    post:
      summary: Catch-all POST
      operationId: catchAllPost
      security:
        - api_key: []
      responses:
        200:
          description: Success
          headers:
            Access-Control-Allow-Origin:
              type: string
              default: "*"
            Access-Control-Allow-Headers:
              type: string
              default: "Content-Type, Authorization, x-api-key"
            Access-Control-Allow-Methods:
              type: string
              default: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
    put:
      summary: Catch-all PUT
      operationId: catchAllPut
      security:
        - api_key: []
      responses:
        200:
          description: Success
          headers:
            Access-Control-Allow-Origin:
              type: string
              default: "*"
            Access-Control-Allow-Headers:
              type: string
              default: "Content-Type, Authorization, x-api-key"
            Access-Control-Allow-Methods:
              type: string
              default: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
    delete:
      summary: Catch-all DELETE
      operationId: catchAllDelete
      security:
        - api_key: []
      responses:
        200:
          description: Success
          headers:
            Access-Control-Allow-Origin:
              type: string
              default: "*"
            Access-Control-Allow-Headers:
              type: string
              default: "Content-Type, Authorization, x-api-key"
            Access-Control-Allow-Methods:
              type: string
              default: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
    patch:
      summary: Catch-all PATCH
      operationId: catchAllPatch
      security:
        - api_key: []
      responses:
        200:
          description: Success
          headers:
            Access-Control-Allow-Origin:
              type: string
              default: "*"
            Access-Control-Allow-Headers:
              type: string
              default: "Content-Type, Authorization, x-api-key"
            Access-Control-Allow-Methods:
              type: string
              default: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
    options:
      summary: Catch-all OPTIONS
      operationId: catchAllOptions
      # Preflight must not require API key
      security: []
      responses:
        200:
          description: Success
          headers:
            Access-Control-Allow-Origin:
              type: string
              default: "*"
            Access-Control-Allow-Headers:
              type: string
              default: "Content-Type, Authorization, x-api-key"
            Access-Control-Allow-Methods:
              type: string
              default: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
